<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reels Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2e3140;
      --accent:    #e1306c;
      --grad-a:    #f58529;
      --grad-b:    #dd2a7b;
      --grad-c:    #8134af;
      --text:      #e2e4ef;
      --muted:     #6b7080;
      --success:   #3ecf8e;
      --error:     #f87171;
      --font-mono: "SF Mono", "Fira Code", Consolas, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 700px;
      margin: 0 auto;
      padding: 28px 20px 20px;
      gap: 18px;
    }

    /* ── Header ── */
    header { display: flex; align-items: center; gap: 12px; }
    .ig-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 13px; color: var(--muted); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); margin-left: auto; flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.running { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error   { background: var(--error); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 11px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color .15s, background .15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, transparent);
    }

    /* ── Tab panels ── */
    .panel { display: none; padding: 20px; flex-direction: column; gap: 16px; }
    .panel.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 12px; font-weight: 500;
      color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    }

    /* Username input */
    .input-prefix-wrap {
      display: flex; align-items: center;
      background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      transition: border-color .2s;
    }
    .input-prefix-wrap:focus-within { border-color: var(--accent); }
    .prefix {
      padding: 0 10px; color: var(--muted);
      font-size: 15px; font-weight: 500;
      user-select: none; border-right: 1px solid var(--border);
    }
    #username {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; padding: 9px 12px;
    }
    #username::placeholder { color: var(--muted); }

    /* URL input */
    #reelUrl {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none;
      transition: border-color .2s;
    }
    #reelUrl:focus { border-color: var(--accent); }
    #reelUrl::placeholder { color: var(--muted); }

    /* Count stepper */
    .count-row { display: flex; align-items: center; gap: 14px; }
    .count-stepper {
      display: flex; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .step-btn {
      width: 36px; height: 38px; background: none; border: none;
      color: var(--muted); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .step-btn:hover:not(:disabled) { color: var(--text); background: var(--border); }
    .step-btn:disabled { opacity: .3; cursor: default; }
    #count {
      width: 52px; text-align: center; background: none; border: none;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      outline: none; color: var(--text); font-size: 15px;
      font-weight: 600; padding: 8px 4px;
    }
    #count::-webkit-inner-spin-button,
    #count::-webkit-outer-spin-button { -webkit-appearance: none; }
    #count[type=number] { -moz-appearance: textfield; }

    .count-presets { display: flex; gap: 6px; flex-wrap: wrap; }
    .preset {
      font-size: 12px; padding: 4px 10px;
      border-radius: 20px; border: 1px solid var(--border);
      background: none; color: var(--muted); cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .preset:hover, .preset.active {
      color: var(--accent); border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    /* Action row */
    .action-row { display: flex; align-items: center; gap: 10px; padding-top: 2px; }
    .btn {
      font-size: 14px; font-weight: 600; padding: 9px 22px;
      border-radius: 8px; border: none; cursor: pointer;
      transition: opacity .15s, transform .1s; white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-download {
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
      color: #fff; flex: 1;
    }
    .btn-download:hover:not(:disabled) { opacity: .88; }
    .btn-stop {
      background: color-mix(in srgb, var(--error) 15%, transparent);
      color: var(--error);
      border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
      display: none;
    }
    .btn-stop.visible { display: inline-flex; }
    .btn-stop:hover:not(:disabled) {
      background: color-mix(in srgb, var(--error) 25%, transparent);
    }

    /* ── Output panel ── */
    .output-wrap {
      flex: 1; min-height: 0;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); display: flex;
      flex-direction: column; overflow: hidden;
    }
    .output-toolbar {
      display: flex; align-items: center;
      padding: 8px 14px; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .output-toolbar span { font-size: 12px; color: var(--muted); flex: 1; }
    .btn-icon {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; padding: 3px 8px;
      border-radius: 5px; transition: color .2s, background .2s;
    }
    .btn-icon:hover { color: var(--text); background: var(--border); }
    #output {
      flex: 1; overflow-y: auto; padding: 14px 16px;
      font-family: var(--font-mono); font-size: 13px;
      line-height: 1.8; white-space: pre-wrap; word-break: break-all;
      color: #c9d1e8;
    }
    #output:empty::before {
      content: "Download log will appear here…";
      color: var(--muted); font-style: italic;
    }
    .line-ok    { color: var(--success); }
    .line-error { color: var(--error); }
    .line-dim   { color: var(--muted); }

    /* ── File download button ── */
    .file-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin: 6px 0; padding: 8px 16px;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--success) 18%, transparent),
        color-mix(in srgb, var(--success) 10%, transparent));
      border: 1px solid color-mix(in srgb, var(--success) 35%, transparent);
      border-radius: 8px;
      color: var(--success);
      font-family: var(--font-mono); font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .file-btn:hover {
      background: color-mix(in srgb, var(--success) 25%, transparent);
      transform: translateY(-1px);
    }
    .file-btn:active { transform: scale(.97); }

    /* ── Progress bar ── */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 0 2px;
    }
    .progress-wrap.visible { display: flex; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .progress-label { color: var(--muted); }
    .progress-pct   { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .progress-track {
      width: 100%; height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--grad-a), var(--grad-b));
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-fill.indeterminate {
      width: 40% !important;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="ig-icon">📥</div>
    <div>
      <h1>Instagram Reels Downloader</h1>
      <p>Download reels by profile or direct link</p>
    </div>
    <span id="statusDot" class="status-dot"></span>
  </header>

  <!-- Form card with tabs -->
  <div class="card">

    <div class="tabs">
      <button class="tab active" data-tab="profile">👤 By Profile</button>
      <button class="tab"        data-tab="url">🔗 By Link</button>
    </div>

    <!-- Profile panel -->
    <div class="panel active" id="panel-profile">
      <div class="field">
        <label for="username">Instagram Username</label>
        <div class="input-prefix-wrap">
          <span class="prefix">@</span>
          <input type="text" id="username" placeholder="username"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
      </div>

      <div class="field">
        <label>Number of Reels</label>
        <div class="count-row">
          <div class="count-stepper">
            <button class="step-btn" id="btnMinus">−</button>
            <input type="number" id="count" value="5" min="1" max="50" />
            <button class="step-btn" id="btnPlus">+</button>
          </div>
          <div class="count-presets">
            <button class="preset" data-val="5">5</button>
            <button class="preset" data-val="10">10</button>
            <button class="preset" data-val="20">20</button>
            <button class="preset" data-val="50">50</button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-stop" id="btnStop">■ Stop</button>
        <button class="btn btn-download" id="btnDownload">Download Reels ↓</button>
      </div>
    </div>

    <!-- URL panel -->
    <div class="panel" id="panel-url">
      <div class="field">
        <label for="reelUrl">Reel URL</label>
        <input type="url" id="reelUrl"
          placeholder="https://www.instagram.com/reel/ABC123/"
          autocomplete="off" spellcheck="false" />
      </div>

      <div class="action-row">
        <button class="btn btn-stop" id="btnStopUrl">■ Stop</button>
        <button class="btn btn-download" id="btnDownloadUrl">Download Reel ↓</button>
      </div>
    </div>

  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Downloading…</span>
      <span class="progress-pct"   id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-wrap">
    <div class="output-toolbar">
      <span id="statusText">Ready</span>
      <button class="btn-icon" id="btnCopy">Copy</button>
      <button class="btn-icon" id="btnClear">Clear</button>
    </div>
    <div id="output"></div>
  </div>

</div>

<script>
  // ── Elements ──────────────────────────────────────────────────────────────
  const usernameEl   = document.getElementById("username");
  const reelUrlEl    = document.getElementById("reelUrl");
  const countEl      = document.getElementById("count");
  const btnDl        = document.getElementById("btnDownload");
  const btnStop      = document.getElementById("btnStop");
  const btnDlUrl     = document.getElementById("btnDownloadUrl");
  const btnStopUrl   = document.getElementById("btnStopUrl");
  const btnMinus     = document.getElementById("btnMinus");
  const btnPlus      = document.getElementById("btnPlus");
  const presets      = document.querySelectorAll(".preset");
  const output       = document.getElementById("output");
  const statusDot    = document.getElementById("statusDot");
  const statusTxt    = document.getElementById("statusText");
  const btnCopy      = document.getElementById("btnCopy");
  const btnClear     = document.getElementById("btnClear");
  const progressWrap = document.getElementById("progressWrap");
  const progressFill = document.getElementById("progressFill");
  const progressPct  = document.getElementById("progressPct");
  const progressLbl  = document.getElementById("progressLabel");

  let controller = null;
  let running    = false;
  let activeMode = "profile";   // "profile" | "url"

  // ── Tabs ──────────────────────────────────────────────────────────────────
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      if (running) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
      activeMode = tab.dataset.tab;
      // focus relevant input
      if (activeMode === "profile") usernameEl.focus();
      else reelUrlEl.focus();
    });
  });

  // ── Count stepper ─────────────────────────────────────────────────────────
  function getCount()  { return parseInt(countEl.value) || 5; }
  function setCount(n) { countEl.value = Math.max(1, Math.min(50, n)); syncPresets(); }
  btnMinus.addEventListener("click", () => setCount(getCount() - 1));
  btnPlus.addEventListener( "click", () => setCount(getCount() + 1));
  countEl.addEventListener( "change", () => setCount(getCount()));

  function syncPresets() {
    const v = String(getCount());
    presets.forEach(p => p.classList.toggle("active", p.dataset.val === v));
  }
  presets.forEach(p => p.addEventListener("click", () => setCount(parseInt(p.dataset.val))));
  syncPresets();

  // ── Strip @ if pasted ─────────────────────────────────────────────────────
  usernameEl.addEventListener("input", () => {
    if (usernameEl.value.startsWith("@")) usernameEl.value = usernameEl.value.slice(1);
  });

  // ── Enter key ─────────────────────────────────────────────────────────────
  usernameEl.addEventListener("keydown", e => { if (e.key === "Enter" && !running) startDownload(); });
  reelUrlEl.addEventListener( "keydown", e => { if (e.key === "Enter" && !running) startDownload(); });

  // ── Buttons ───────────────────────────────────────────────────────────────
  btnDl.addEventListener(     "click", () => { if (!running) startDownload(); });
  btnDlUrl.addEventListener(  "click", () => { if (!running) startDownload(); });
  btnStop.addEventListener(   "click", () => { if (controller) controller.abort(); });
  btnStopUrl.addEventListener("click", () => { if (controller) controller.abort(); });
  btnClear.addEventListener(  "click", () => { output.innerHTML = ""; setStatus("idle"); });
  btnCopy.addEventListener(   "click", () => {
    navigator.clipboard.writeText(output.innerText).then(() => {
      btnCopy.textContent = "Copied!";
      setTimeout(() => { btnCopy.textContent = "Copy"; }, 1500);
    });
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(state, text) {
    statusDot.className = "status-dot" + (state !== "idle" ? " " + state : "");
    statusTxt.textContent = text
      || { idle: "Ready", running: "Downloading…", error: "Error" }[state]
      || state;
  }

  function appendLine(text, cls) {
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text;
    output.appendChild(span);
    output.scrollTop = output.scrollHeight;
  }

  function appendFileBtn(fname) {
    const a = document.createElement("a");
    a.href      = "/files/" + encodeURIComponent(fname);
    a.download  = fname;
    a.className = "file-btn";
    a.innerHTML = `⬇ Save  ${fname}`;
    // Force download on click (some browsers open video inline)
    a.addEventListener("click", async e => {
      e.preventDefault();
      try {
        const res  = await fetch(a.href);
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const tmp  = document.createElement("a");
        tmp.href     = url;
        tmp.download = fname;
        tmp.click();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch {
        window.open(a.href, "_blank");
      }
    });
    output.appendChild(a);
    output.appendChild(document.createTextNode("\n"));
    output.scrollTop = output.scrollHeight;
  }

  // ── Progress helpers ──────────────────────────────────────────────────────
  function showProgress(indeterminate = false) {
    progressWrap.classList.add("visible");
    progressFill.classList.toggle("indeterminate", indeterminate);
    if (indeterminate) { progressPct.textContent = ""; }
  }
  function updateProgress(current, total) {
    progressFill.classList.remove("indeterminate");
    const pct = Math.round((current / total) * 100);
    progressFill.style.width = pct + "%";
    progressPct.textContent  = pct + "%";
    progressLbl.textContent  = `Reel ${current} of ${total}`;
  }
  function hideProgress() {
    progressFill.style.width = "100%";
    progressPct.textContent  = "100%";
    setTimeout(() => {
      progressWrap.classList.remove("visible");
      progressFill.style.width = "0%";
    }, 800);
  }

  function setRunning(yes) {
    running = yes;
    btnDl.disabled    = yes;
    btnDlUrl.disabled = yes;
    btnStop.classList.toggle(   "visible", yes && activeMode === "profile");
    btnStopUrl.classList.toggle("visible", yes && activeMode === "url");
    btnMinus.disabled = yes;
    btnPlus.disabled  = yes;
    presets.forEach(p => p.disabled = yes);
    usernameEl.disabled = yes;
    reelUrlEl.disabled  = yes;
    document.querySelectorAll(".tab").forEach(t => t.disabled = yes);
  }

  // ── Core ──────────────────────────────────────────────────────────────────
  async function startDownload() {
    let body;

    if (activeMode === "profile") {
      const username = usernameEl.value.trim();
      if (!username) { usernameEl.focus(); return; }
      body = { username, count: getCount() };
    } else {
      const url = reelUrlEl.value.trim();
      if (!url) { reelUrlEl.focus(); return; }
      body = { url };
    }

    output.innerHTML = "";
    setRunning(true);
    setStatus("running");
    controller = new AbortController();

    // Show indeterminate bar until we know the total
    progressLbl.textContent = "Connecting…";
    progressPct.textContent = "";
    showProgress(activeMode === "url");

    try {
      const resp = await fetch("/download", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(body),
        signal:  controller.signal,
      });

      if (!resp.ok) { appendLine(`HTTP error ${resp.status}\n`, "line-error"); setStatus("error"); return; }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop();

        for (const ev of events) {
          if (!ev.startsWith("data:")) continue;
          const raw = ev.slice(5).trim();
          if (raw === "[DONE]") { setStatus("idle", "Done ✓"); setRunning(false); hideProgress(); return; }

          let obj;
          try { obj = JSON.parse(raw); } catch { continue; }

          if (obj.error) {
            appendLine("❌ " + obj.error + "\n", "line-error");
            setStatus("error");
            hideProgress();
          } else if (obj.text) {
            const t = obj.text;

            // File ready — show download button
            if (t.startsWith("__FILE__")) {
              appendFileBtn(t.slice(8).trim());
              continue;
            }

            // Parse [current/total] to drive progress bar  e.g. "⬇️  [2/5] …"
            const m = t.match(/\[(\d+)\/(\d+)\]/);
            if (m) {
              updateProgress(parseInt(m[1]), parseInt(m[2]));
            }

            // Switch from indeterminate once we know count
            if (t.includes("Found") && t.includes("reel")) {
              showProgress(false);
            }

            const cls = t.startsWith("✅") ? "line-ok"
                      : t.startsWith("❌") ? "line-error"
                      : t.startsWith("─")  ? "line-dim"
                      : null;
            appendLine(t, cls);
          }
        }
      }

    } catch (err) {
      if (err.name === "AbortError") {
        appendLine("\n⚠️  Stopped by user.\n", "line-error");
        setStatus("idle", "Stopped");
        hideProgress();
      } else {
        appendLine(`\n❌ ${err.message}\n`, "line-error");
        setStatus("error");
        hideProgress();
      }
    } finally {
      setRunning(false);
      controller = null;
    }
  }

  usernameEl.focus();
</script>
</body>
</html>
