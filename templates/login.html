<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Reels Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3140;
      --text:    #e2e4ef;
      --muted:   #6b7080;
      --error:   #f87171;
      --grad-a:  #f58529;
      --grad-b:  #dd2a7b;
      --grad-c:  #8134af;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 36px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .ig-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    p.sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-top: -16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: var(--grad-b); }
    input[type="password"]::placeholder { color: var(--muted); }

    .error {
      font-size: 13px;
      color: var(--error);
      background: color-mix(in srgb, var(--error) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--error) 25%, transparent);
      border-radius: 7px;
      padding: 9px 13px;
      text-align: center;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button[type="submit"]:hover  { opacity: .88; }
    button[type="submit"]:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="ig-icon">📥</div>
      <h1>Reels Downloader</h1>
      <p class="sub">Enter your password to continue</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autofocus
          required
        />
      </div>
      <br/>
      <button type="submit">Sign in →</button>
    </form>

  </div>
</body>
</html>
